<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Descargar Boardviews</title>
</head>

<body>

<h2>Download .cad board example / Descarga placa .cad de ejemplo</h2>

<button onclick="descargarXbox()">xbox.cad</button>
<button onclick="descargarGPU()">gpu.cad</button>

<script>

function descargarXbox(){

const frame=document.createElement("iframe")
frame.style.display="none"

frame.src="https://ph.i2mx.com.mx/Documents/Schematics/Consolas/XBOX/Xbox%20360/04%20Xbox%20360%20Slim%20E%20Sterling%20Boardview.cad"

document.body.appendChild(frame)

}

function descargarGPU(){

const frame=document.createElement("iframe")
frame.style.display="none"

frame.src="https://ph.i2mx.com.mx/Documents/Schematics/GPU/NVIDIA/MSI_RTX_2060_2070_TU106_MS-V379_Rev_7.0_BoardView.cad.zip"

document.body.appendChild(frame)

}

</script>

</body>
</html>
