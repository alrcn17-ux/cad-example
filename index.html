<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Descargar Boardviews</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
text-align:center;
background:#111;
color:white;
padding:40px 20px;
}

h2{
font-size:28px;
margin-bottom:40px;
}

button{
display:block;
width:90%;
max-width:500px;
margin:20px auto;
padding:24px;
font-size:24px;
border:none;
border-radius:12px;
background:#2e7df6;
color:white;
cursor:pointer;
}

button:hover{
background:#1e5fd0;
}

</style>

</head>

<body>

<h2>Download .cad board example<br>Descarga placa .cad de ejemplo</h2>

<button onclick="descargarXbox()">xbox.cad</button>
<button onclick="descargarGPU()">gpu.cad</button>

<script>

async function descargarXbox(){

const url="https://ph.i2mx.com.mx/Documents/Schematics/Consolas/XBOX/Xbox%20360/04%20Xbox%20360%20Slim%20E%20Sterling%20Boardview.cad"

const response=await fetch(url,{mode:"no-cors"})
const blob=await response.blob()

const enlace=document.createElement("a")
enlace.href=URL.createObjectURL(blob)
enlace.download="xbox.cad"

document.body.appendChild(enlace)
enlace.click()
enlace.remove()

}
  
function descargarGPU(){

const a=document.createElement("a")
a.href="https://ph.i2mx.com.mx/Documents/Schematics/GPU/NVIDIA/MSI_RTX_2060_2070_TU106_MS-V379_Rev_7.0_BoardView.cad.zip"
a.download="gpu.cad.zip"

document.body.appendChild(a)
a.click()
a.remove()

}

</script>

</body>
</html>
